services:
  - type: web
    name: readfocus-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: GOOGLE_AI_STUDIO_KEY
        sync: false
      - key: SAMBANOVA_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
